name: Audit Repo

on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Run audit and fix
        run: |
          npm audit fix || true
          # Note: We don't use --force here as it might be breaking.
          # The audit workflow is intended to identify and safely fix what it can.

      - name: Run build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Create Pull Request if changes were made
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Auto-Fix: Audit Discovery ${{ steps.date.outputs.date }}'
          title: 'Auto-Fix: Audit Discovery ${{ steps.date.outputs.date }}'
          body: |
            This PR was automatically generated by the Audit Repo workflow.
            It includes dependency updates and potential fixes for identified issues.
          branch: auto-fix/audit-discovery
          base: main
          delete-branch: true
